<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Template Webapp</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #60a5fa;
            --bg-color: #111827;
            --surface-color: #1f2937;
            --text-color: #f9fafb;
            --border-color: #374151;
            --border-radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .navbar {
            background-color: var(--surface-color);
            width: 100%;
            padding: 1rem 2rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--primary-color);
        }

        .logout-btn {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .logout-btn:hover {
            background-color: var(--border-color);
        }

        .content {
            background-color: var(--surface-color);
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            margin-top: 3rem;
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        .status-loading {
            color: #9ca3af;
        }

        .status-success {
            color: #34d399;
        }

        .status-error {
            color: #f87171;
        }

        .pubkey-container {
            margin-top: 2rem;
            text-align: left;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 1rem;
            border-radius: var(--border-radius);
            font-family: monospace;
            font-size: 0.875rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>Template Webapp</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="content">
    <h2 id="welcome-message" class="status-loading">Loading securely...</h2>
    <p id="details"></p>

    <div id="user-info-display" style="display: none;">
        <h3>User Information (JWT Claims):</h3>
        <pre id="user-info-content" class="pubkey-container"></pre>
    </div>

    <div id="pubkey-display" style="display: none;">
        <h3>IAM Public Key Used for Verification:</h3>
        <pre id="pubkey-content" class="pubkey-container"></pre>
    </div>
</div>

<script>
    // Configuration: Backend API
    const API_BASE_URL = window.location.origin;

    function logout() {
        localStorage.removeItem('auth_token');
        window.location.href = '/login.html';
    }

    async function fetchHello() {
        const token = localStorage.getItem('auth_token');
        if (!token) {
            window.location.href = '/login.html';
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/api/hello`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (response.status === 401 || response.status === 403) {
                // Token invalid or expired
                logout();
                return;
            }

            if (!response.ok) {
                throw new Error('Failed to fetch data from backend');
            }

            const data = await response.json();
            
            const welcomeEl = document.getElementById('welcome-message');
            welcomeEl.innerText = data.message;
            welcomeEl.className = 'status-success';

            const detailsEl = document.getElementById('details');
            detailsEl.innerText = `Authenticated successfully. User ID (uid): ${data.uid}`;

            // Decode JWT to display all user claims
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                
                const claims = JSON.parse(jsonPayload);
                document.getElementById('user-info-display').style.display = 'block';
                document.getElementById('user-info-content').innerText = JSON.stringify(claims, null, 2);
            } catch (e) {
                console.error("Failed to parse JWT payload for UI display", e);
            }

            if (data.public_key) {
                document.getElementById('pubkey-display').style.display = 'block';
                document.getElementById('pubkey-content').innerText = data.public_key;
            }

        } catch (error) {
            const welcomeEl = document.getElementById('welcome-message');
            welcomeEl.innerText = 'Error loading content';
            welcomeEl.className = 'status-error';
            
            const detailsEl = document.getElementById('details');
            detailsEl.innerText = error.message;
        }
    }

    window.onload = fetchHello;
</script>

</body>
</html>
