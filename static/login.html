<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Template Webapp</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #60a5fa;
            --bg-color: #111827;
            --surface-color: #1f2937;
            --text-color: #f9fafb;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --error-color: #f87171;
            --border-radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background-color: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .auth-header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .auth-header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 0.875rem;
        }

        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s, border-bottom 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 500;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #4b5563;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Please log in or sign up to continue</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Login</div>
        <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <form id="auth-form" onsubmit="handleAuth(event)">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="submit-btn">Login</button>
        <div class="error-message" id="error-message"></div>
    </form>
</div>

<script>
    // Configuration: Point this to the grxm-iam service
    const IAM_BASE_URL = window.location.origin; // Assuming IAM is on the same domain or proxied
    // If the IAM service runs on a different port/host during dev, you can hardcode it, e.g. "http://localhost:8081"
    
    let currentMode = 'login';

    function switchTab(mode) {
        currentMode = mode;
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => tab.classList.remove('active'));
        
        if (mode === 'login') {
            tabs[0].classList.add('active');
            document.getElementById('submit-btn').innerText = 'Login';
            document.querySelector('.auth-header h1').innerText = 'Welcome Back';
        } else {
            tabs[1].classList.add('active');
            document.getElementById('submit-btn').innerText = 'Sign Up';
            document.querySelector('.auth-header h1').innerText = 'Create an Account';
        }
        document.getElementById('error-message').style.display = 'none';
    }

    async function handleAuth(event) {
        event.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');

        errorDiv.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.innerText = 'Loading...';

        const endpoint = currentMode === 'login' ? '/iam/api/v1/login' : '/iam/api/v1/register';
        const payload = {
            type: "email-password",
            fields: {
                email: email,
                password: password
            }
        };

        try {
            // Note: Replace IAM_BASE_URL with your actual grxm-iam service URL if it's hosted elsewhere
            const response = await fetch(`${IAM_BASE_URL}${endpoint}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload),
                // Important: Include credentials so the backend can set the cookie
                credentials: 'same-origin'
            });

            const data = await response.json();

            if (response.ok && data.success) {
                // If the backend returns the token in the response body but didn't set a cookie (e.g. legacy mode),
                // we'll manually set a non-HttpOnly cookie as a fallback so the frontend works smoothly.
                // Ideally, grxm-iam is setting this as an HttpOnly cookie automatically.
                if (data.token && !document.cookie.includes('grxm-token=')) {
                    document.cookie = `grxm-token=${data.token}; path=/; max-age=86400; SameSite=Lax`;
                }
                
                // Redirect to the protected application page
                window.location.href = '/';
            } else {
                throw new Error(data.message || 'Authentication failed');
            }
        } catch (error) {
            errorDiv.innerText = error.message;
            errorDiv.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = currentMode === 'login' ? 'Login' : 'Sign Up';
        }
    }

    // Check if already logged in by looking for the cookie
    window.onload = () => {
        if (document.cookie.includes('grxm-token=')) {
            window.location.href = '/';
        }
    };
</script>

</body>
</html>
